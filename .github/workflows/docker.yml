name: docker
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t mcp-supabase-latam:ci .
      - name: Show image size
        run: docker images mcp-supabase-latam:ci
